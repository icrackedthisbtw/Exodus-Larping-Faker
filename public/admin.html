<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exodus Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { overflow: auto; }
    #admin-app {
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 0;
    }
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-topbar h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .admin-content { max-width: 960px; margin: 0 auto; padding: 32px; }
    .admin-section { margin-bottom: 40px; }
    .admin-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .admin-section-header h2 { font-size: 16px; font-weight: 700; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .admin-table th {
      background: var(--bg-secondary);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg-card-hover); }
    .inline-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 13px;
      color: var(--text-primary);
      width: 100%;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }
    .inline-input:focus { border-color: var(--border-focus); }
    .inline-input.wide { min-width: 200px; }
    .inline-input.narrow { width: 90px; }
    .inline-input.mono { font-family: var(--font-mono); font-size: 11px; }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      flex-shrink: 0;
    }
    .asset-sym-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inline-save-row {
      background: var(--bg-secondary);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .add-row td { background: var(--bg-secondary); }
    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    /* Portfolio meta */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
  </style>
</head>
<body>
<div id="admin-app">

  <div class="admin-topbar">
    <h1>
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#8B5CF6"/>
        <path d="M11 14h18M11 20h12M11 26h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      Exodus Admin Panel
    </h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="save-status" style="font-size:13px;color:var(--text-secondary);"></span>
      <a href="/" class="btn btn-secondary btn-sm">← View Wallet</a>
      <button class="btn btn-primary btn-sm" onclick="saveAll()">Save All Changes</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Portfolio Meta -->
    <div class="admin-section">
      <div class="admin-section-header">
        <h2>Portfolio Settings</h2>
      </div>
      <div class="meta-grid" id="portfolio-meta"></div>
    </div>

    <!-- Assets -->
    <div class="admin-section">
      <div class="admin-section-header">
        <h2>Assets & Balances</h2>
        <button class="btn btn-secondary btn-sm" onclick="addAssetRow()">+ Add Asset</button>
      </div>
      <table class="admin-table" id="assets-table">
        <thead>
          <tr>
            <th>Color</th>
            <th>Symbol</th>
            <th>Name</th>
            <th>Balance</th>
            <th>Price (USD)</th>
            <th>24h Change %</th>
            <th>APY %</th>
            <th>Network</th>
            <th>Address</th>
            <th>Icon URL</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="assets-tbody"></tbody>
      </table>
    </div>

    <!-- Transactions -->
    <div class="admin-section">
      <div class="admin-section-header">
        <h2>Transactions</h2>
        <button class="btn btn-secondary btn-sm" onclick="addTxRow()">+ Add Transaction</button>
      </div>
      <table class="admin-table" id="tx-table">
        <thead>
          <tr>
            <th>Asset</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Value (USD)</th>
            <th>Status</th>
            <th>Date</th>
            <th>From</th>
            <th>To</th>
            <th>Memo</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tx-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="/js/utils.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
